name: release-action

on:
  push:
    branches: [ main ]
    tags:
      - '*'

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Test with Maven
        run: mvn test -B


  deliver-container:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build the JAR file with Maven
        run: mvn package -B

      - name: Build the Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/java-console-test:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Push the image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/java-console-test:latest


  deliver-jar:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Build the JAR file with Maven
        run: mvn package -B

      - name: Upload the JAR file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar


  release:
    runs-on: ubuntu-latest
    needs: deliver-jar
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: jar

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "jar/*.jar"